version: '3.8'

services:
  web:
    build:
      context: .
      target: production
    ports:
      - "8010:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://espn:espn@db:5432/espn_service
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # local.py defaults eager=True (fine for SQLite-only dev); Docker needs the worker + Redis.
      - CELERY_TASK_ALWAYS_EAGER=False
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    # Enqueue allowlist horizon fan-out once after migrate (Beat alone only runs at 00:15 UTC).
    command: >
      sh -c "python manage.py migrate &&
             python manage.py shell -c 'from apps.ingest.tasks import fan_out_allowlist_horizon_task; fan_out_allowlist_horizon_task.delay()' &&
             python manage.py runserver 0.0.0.0:8000"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=espn
      - POSTGRES_PASSWORD=espn
      - POSTGRES_DB=espn_service
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host port 5433 avoids clashing with other local Postgres (e.g. Betolyn on 5432).
    ports:
      - "${ESPN_DB_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U espn -d espn_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: .
      target: production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://espn:espn@db:5432/espn_service
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=False
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    # Listen on both default and ingest queues when CELERY_ROUTE_INGEST_TO_QUEUE=true
    command: celery -A config worker -l INFO -Q celery,ingest
    healthcheck:
      disable: true

  celery-beat:
    build:
      context: .
      target: production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://espn:espn@db:5432/espn_service
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=False
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    volumes:
      - .:/app
    command: celery -A config beat -l INFO
    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
