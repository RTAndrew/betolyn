spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/betolyn}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: "create-only"
    show-sql: true
    properties:
      hibernate:
        format_sql: false
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

services:
  redis:
    host: ${SERVICES_REDIS_HOST:localhost}
    port: ${SERVICES_REDIS_PORT:6379}

app:
  auth:
    sessionExpirationInDays: 7
    cookiesTokenNameKey: "token"
    jwtSecret: "jS7I27ggI1XJMvxIPdylTRcB2g1zeeNY9jaBo0QeaQT"
  cors:
    allowedOrigins: "http://localhost:8001"
