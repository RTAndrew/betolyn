info:
  name: Ingest scoreboard data
  type: http
  seq: 1
  tags:
    - Ingest

http:
  method: POST
  url: "{{baseUrl}}/api/v1/ingest/scoreboard/"
  body:
    type: json
    data: |-
      {
        "sport": "",
        "league": "",
        "date": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/ingest/scoreboard/"
      method: POST
      body:
        type: json
        data: |-
          {
            "sport": "",
            "league": "",
            "date": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "created": 0,
            "updated": 0,
            "errors": 0,
            "total_processed": 0,
            "details": []
          }
  - name: 400 Response
    request:
      url: "{{baseUrl}}/api/v1/ingest/scoreboard/"
      method: POST
      body:
        type: json
        data: |-
          {
            "sport": "",
            "league": "",
            "date": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 502 Response
    request:
      url: "{{baseUrl}}/api/v1/ingest/scoreboard/"
      method: POST
      body:
        type: json
        data: |-
          {
            "sport": "",
            "league": "",
            "date": ""
          }
    response:
      status: 502
      statusText: Bad Gateway
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
