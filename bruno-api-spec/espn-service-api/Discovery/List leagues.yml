info:
  name: List leagues
  type: http
  seq: 1
  tags:
    - Discovery

http:
  method: GET
  url: "{{baseUrl}}/api/v1/leagues/"
  params:
    - name: ordering
      value: ""
      type: query
      description: Which field to use when ordering the results.
      disabled: true
    - name: page
      value: ""
      type: query
      description: A page number within the paginated result set.
      disabled: true
    - name: search
      value: ""
      type: query
      description: A search term.
      disabled: true
    - name: sport
      value: ""
      type: query
      description: Filter by sport slug (e.g., 'basketball')
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/leagues/"
      method: GET
      params:
        - name: ordering
          value: ""
          type: query
          description: Which field to use when ordering the results.
          disabled: true
        - name: page
          value: ""
          type: query
          description: A page number within the paginated result set.
          disabled: true
        - name: search
          value: ""
          type: query
          description: A search term.
          disabled: true
        - name: sport
          value: ""
          type: query
          description: Filter by sport slug (e.g., 'basketball')
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "count": 123,
            "next": "http://api.example.org/accounts/?page=4",
            "previous": "http://api.example.org/accounts/?page=2",
            "results": [
              {
                "id": 0,
                "slug": "",
                "name": "",
                "abbreviation": "",
                "sport": "",
                "created_at": "",
                "updated_at": ""
              }
            ]
          }
