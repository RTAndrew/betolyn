info:
  name: Get sport details
  type: http
  seq: 4
  tags:
    - Discovery

http:
  method: GET
  url: "{{baseUrl}}/api/v1/sports/:slug/"
  params:
    - name: slug
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/sports/:slug/"
      method: GET
      params:
        - name: slug
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "slug": "",
            "name": "",
            "created_at": "",
            "updated_at": ""
          }
