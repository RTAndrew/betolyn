info:
  name: Health check
  type: http
  seq: 1
  tags:
    - Health

http:
  method: GET
  url: "{{baseUrl}}/healthz"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/healthz"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "healthy",
            "database": "connected"
          }
  - name: 503 Response
    request:
      url: "{{baseUrl}}/healthz"
      method: GET
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "unhealthy",
            "database": "disconnected",
            "error": ""
          }
