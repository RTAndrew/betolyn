info:
  name: List teams
  type: http
  seq: 1
  tags:
    - Teams

http:
  method: GET
  url: "{{baseUrl}}/api/v1/teams/"
  params:
    - name: abbreviation
      value: ""
      type: query
      description: Filter by team abbreviation
      disabled: true
    - name: is_active
      value: ""
      type: query
      description: Filter by active status
      disabled: true
    - name: league
      value: ""
      type: query
      description: Filter by league slug (e.g., 'nba')
      disabled: true
    - name: ordering
      value: ""
      type: query
      description: Which field to use when ordering the results.
      disabled: true
    - name: page
      value: ""
      type: query
      description: A page number within the paginated result set.
      disabled: true
    - name: search
      value: ""
      type: query
      description: Search in display_name, abbreviation, or location
      disabled: true
    - name: sport
      value: ""
      type: query
      description: Filter by sport slug (e.g., 'basketball')
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

