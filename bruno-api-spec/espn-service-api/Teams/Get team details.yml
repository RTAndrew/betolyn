info:
  name: Get team details
  type: http
  seq: 2
  tags:
    - Teams

http:
  method: GET
  url: "{{baseUrl}}/api/v1/teams/:id/"
  params:
    - name: id
      value: ""
      type: path
      description: A unique integer value identifying this team.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
