info:
  name: List events
  type: http
  seq: 1
  tags:
    - Events

http:
  method: GET
  url: "{{baseUrl}}/api/v1/events/"
  params:
    - name: date
      value: ""
      type: query
      description: Filter by exact date (YYYY-MM-DD)
      disabled: true
    - name: date_from
      value: ""
      type: query
      description: Filter by date >= (YYYY-MM-DD)
      disabled: true
    - name: date_to
      value: ""
      type: query
      description: Filter by date <= (YYYY-MM-DD)
      disabled: true
    - name: league
      value: ""
      type: query
      description: Filter by league slug (e.g., 'nba')
      disabled: true
    - name: ordering
      value: ""
      type: query
      description: Which field to use when ordering the results.
      disabled: true
    - name: page
      value: ""
      type: query
      description: A page number within the paginated result set.
      disabled: true
    - name: search
      value: ""
      type: query
      description: A search term.
      disabled: true
    - name: season_type
      value: ""
      type: query
      description: Filter by season type (1=preseason, 2=regular, 3=postseason)
      disabled: true
    - name: season_year
      value: ""
      type: query
      description: Filter by season year
      disabled: true
    - name: sport
      value: ""
      type: query
      description: Filter by sport slug (e.g., 'basketball')
      disabled: true
    - name: status
      value: ""
      type: query
      description: Filter by status (scheduled, in_progress, final)
      disabled: true
    - name: team
      value: ""
      type: query
      description: Filter by team ESPN ID or abbreviation
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

